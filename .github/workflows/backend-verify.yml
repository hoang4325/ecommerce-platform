name: Backend Verify

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Docker
        run: docker version

      - name: Run backend tests
        run: mvn -B -pl ecommerce-platform-server -am clean verify

      - name: Verify test reports
        if: always()
        run: python3 scripts/verify_test_reports.py

      - name: Publish Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: ecommerce-platform-server/target/surefire-reports/**
          if-no-files-found: warn

      - name: Publish Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-failsafe-reports
          path: ecommerce-platform-server/target/failsafe-reports/**
          if-no-files-found: error
