server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_platform
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=false
seed.lotustowel.enabled=true

# Swagger
springdoc.swagger-ui.tagsSorter=alpha

# JWT
jwt.secret=${JWT_SECRET}

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=main-server
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.yashmerino.ecommerce.kafka.events

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Phase 1 checkout reliability
checkout.reservation-ttl=PT15M
checkout.expiry-job-delay-ms=30000
outbox.publish-delay-ms=1000

# V2 payment topics
payment.topics.payment-result-v2=payment.result.v2
payment.topics.payment-review-v2=payment.review.required.v2
payment.topics.refund-requested-v2=payment.refund.requested.v2
payment.topics.refund-result-v2=payment.refund.result.v2
payment.topics.notification-requested-v2=notification.requested.v2
